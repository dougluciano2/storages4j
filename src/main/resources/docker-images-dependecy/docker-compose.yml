version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: storages4j-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: developer
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: